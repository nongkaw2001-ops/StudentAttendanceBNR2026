<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อนักเรียน BNR 2026</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%E2%9C%93%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="app-shell">
        <header class="hero">
            <div>
                <p class="eyebrow">BNR 2026</p>
                <h1>ระบบเช็คชื่อนักเรียน</h1>
                <p class="subtitle">สำหรับครู เช็คชื่อรายวัน แยกตามห้องเรียน</p>
            </div>
            <div class="user-panel" id="userPanel" hidden>
                <span id="userEmail"></span>
                <button class="button button-ghost" id="signOutButton" type="button">ออกจากระบบ</button>
            </div>
        </header>

        <section class="auth-card" id="authView">
            <div class="card auth-box">
                <h2>เข้าสู่ระบบครู</h2>
                <p>ต้องใช้บัญชีที่ได้รับอนุญาตก่อนอ่านหรือแก้ไขข้อมูลนักเรียน</p>
                <label class="field">
                    <span>Email</span>
                    <input id="emailInput" type="email" autocomplete="email" placeholder="teacher@example.com">
                </label>
                <label class="field">
                    <span>Password</span>
                    <input id="passwordInput" type="password" autocomplete="current-password" placeholder="รหัสผ่าน">
                </label>
                <button class="button button-primary" id="signInButton" type="button">เข้าสู่ระบบ</button>
                <p class="status-message" id="authMessage" role="status"></p>
            </div>
        </section>

        <section id="appView" hidden>
            <nav class="tabs" aria-label="เมนูหลัก">
                <button class="tab active" data-section="attendance" type="button">เช็คชื่อ</button>
                <button class="tab" data-section="students" data-admin-only type="button">จัดการนักเรียน</button>
                <button class="tab" data-section="history" type="button">ประวัติย้อนหลัง</button>
            </nav>

            <section class="card controls-card">
                <label class="field compact">
                    <span>ห้องเรียน</span>
                    <select id="classSelect"></select>
                </label>
                <form class="inline-form" id="classForm" data-admin-only>
                    <input id="newClassName" type="text" placeholder="เพิ่มห้อง เช่น ม.1/1" maxlength="40">
                    <button class="button button-secondary" type="submit">+ เพิ่มห้อง</button>
                </form>
            </section>

            <section class="section active" id="attendanceSection">
                <div class="card">
                    <div class="date-nav">
                        <button class="button button-icon" id="previousDateButton" type="button" aria-label="วันก่อนหน้า">‹</button>
                        <strong id="currentDateLabel"></strong>
                        <button class="button button-icon" id="nextDateButton" type="button" aria-label="วันถัดไป">›</button>
                    </div>

                    <div class="summary-grid">
                        <article class="summary-item">
                            <strong id="totalCount">0</strong>
                            <span>ทั้งหมด</span>
                        </article>
                        <article class="summary-item present">
                            <strong id="presentCount">0</strong>
                            <span>มา</span>
                        </article>
                        <article class="summary-item absent">
                            <strong id="absentCount">0</strong>
                            <span>ไม่มา</span>
                        </article>
                        <article class="summary-item late">
                            <strong id="lateCount">0</strong>
                            <span>สาย</span>
                        </article>
                    </div>

                    <div class="action-row">
                        <button class="button button-success" id="markAllPresentButton" type="button">มาทุกคน</button>
                    </div>

                    <ul class="student-list" id="attendanceList"></ul>
                </div>
            </section>

            <section class="section" id="studentsSection" data-admin-only>
                <div class="card">
                    <h2>เพิ่มนักเรียน</h2>
                    <form class="inline-form" id="studentForm">
                        <input id="newStudentName" type="text" placeholder="ชื่อ-นามสกุล" maxlength="80">
                        <button class="button button-primary" type="submit">+ เพิ่มนักเรียน</button>
                    </form>
                </div>

                <div class="card">
                    <h2>รายชื่อนักเรียน <span id="studentCount">0</span> คน</h2>
                    <ul class="student-list" id="studentList"></ul>
                </div>
            </section>

            <section class="section" id="historySection">
                <div class="card">
                    <h2>ประวัติย้อนหลัง</h2>
                    <form class="inline-form" id="historyForm">
                        <input id="historyDate" type="date">
                        <button class="button button-primary" type="submit">ดูประวัติ</button>
                    </form>
                    <div id="historyList" class="history-list"></div>
                </div>
            </section>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/firebase.js"></script>
    <script src="./js/store.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
