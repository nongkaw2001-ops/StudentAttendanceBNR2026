name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy_live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Firebase service account secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STUDENTATTENDANCE_BNR2026 }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing GitHub Actions secret: FIREBASE_SERVICE_ACCOUNT_STUDENTATTENDANCE_BNR2026"
            echo "Add it in GitHub repo Settings > Secrets and variables > Actions > Repository secrets."
            exit 1
          fi

      - name: Deploy live site
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STUDENTATTENDANCE_BNR2026 }}
          channelId: live
          projectId: studentattendance-bnr2026
